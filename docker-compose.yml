services:
  postgres:
    image: postgres:16-alpine
    container_name: ssa-tenant-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ssa
      POSTGRES_PASSWORD: ssa
      POSTGRES_DB: tenant_manager
    ports:
      - "5432:5432"
    volumes:
      - ssa_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ssa-tenant-manager-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  ssa_postgres_data:
